<!DOCTYPE html>
<html>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;color:#fff;font-family:sans-serif">
    <h3>Skor: <span id="s">0</span></h3>
    <canvas id="c" width="400" height="400" style="border:2px solid #555;background:#000"></canvas>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        let snake = [{x:10, y:10}], food = {x:15, y:15}, dx = 0, dy = 0, score = 0;

        function draw() {
            // Gerakkan ular
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Cek makan apel
            if (head.x === food.x && head.y === food.y) {
                score++; document.getElementById('s').innerText = score;
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            } else { snake.pop(); }

            // Cek tabrakan (tembok atau diri sendiri)
            if (head.x<0 || head.x>19 || head.y<0 || head.y>19 || snake.slice(1).some(s => s.x === head.x && s.y === head.y)) {
                alert("Game Over!"); snake = [{x:10, y:10}]; dx = dy = score = 0;
            }

            // Gambar ulang
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,400,400);
            ctx.fillStyle = 'red'; ctx.fillRect(food.x*20, food.y*20, 18, 18);
            ctx.fillStyle = 'lime'; snake.forEach(p => ctx.fillRect(p.x*20, p.y*20, 18, 18));
            setTimeout(draw, 100);
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
        });
        draw();
    </script>
</body>
</html>
